<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>しょぼんのパクリ（改善版）</title>
<style>
body{margin:0;background:#222;text-align:center;}
canvas{display:block;margin:auto;}
</style>
</head>
<body>

<canvas id="c" width="800" height="400"></canvas>

<script>
const ctx=c.getContext("2d");

let keys={},prev={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

// ===== プレイヤー =====
let p={x:100,y:200,w:28,h:28,vx:0,vy:0,on:false,coyote:0,buf:0};
let cam=0;

// ===== 定数 =====
const GRAV=0.5,MAX_FALL=12;
const ACC=0.6,AIR=0.3,FRIC=0.8,MAX=5,JUMP=11;

// ===== マップ =====
const TILE=32;
const map=[
"............................",
"............................",
"............................",
"..........###...............",
"......................###...",
"############################"
];

// ===== 安定した判定 =====
function solid(px,py){
 let tx=Math.floor(px/TILE);
 let ty=Math.floor(py/TILE);
 if(ty<0||ty>=map.length)return false;
 if(tx<0||tx>=map[0].length)return false;
 return map[ty][tx]==="#";
}

// ===== 更新 =====
function update(){

 let acc=p.on?ACC:AIR;
 if(keys["ArrowRight"])p.vx+=acc;
 if(keys["ArrowLeft"])p.vx-=acc;

 p.vx*=FRIC;
 if(p.vx>MAX)p.vx=MAX;
 if(p.vx<-MAX)p.vx=-MAX;

 let jump=(keys[" "]&&!prev[" "])||(keys["ArrowUp"]&&!prev["ArrowUp"]);
 if(jump)p.buf=6;

 p.vy+=GRAV;
 if(p.vy>MAX_FALL)p.vy=MAX_FALL;

 if(p.coyote>0)p.coyote--;

 if(p.buf>0 && p.coyote>0){
  p.vy=-JUMP;
  p.buf=0;
  p.coyote=0;
 }
 p.buf--;

 if(!keys[" "]&&!keys["ArrowUp"] && p.vy<0)p.vy+=0.5;

 // X
 p.x+=p.vx;
 if(solid(p.x,p.y)||solid(p.x+p.w,p.y)){
  p.x-=p.vx;p.vx=0;
 }

 // Y
 p.y+=p.vy;
 p.on=false;

 if(solid(p.x,p.y+p.h)||solid(p.x+p.w,p.y+p.h)){
  p.y=Math.floor((p.y+p.h)/TILE)*TILE-p.h;
  p.vy=0;
  p.on=true;
  p.coyote=6;
 }

 if(solid(p.x,p.y)||solid(p.x+p.w,p.y)){
  p.y+=2;p.vy=0;
 }

 cam+=(p.x-400-cam)*0.1;

 prev={...keys};
}

// ===== 描画 =====
function draw(){

 // 空グラデ
 let g=ctx.createLinearGradient(0,0,0,400);
 g.addColorStop(0,"#87CEEB");
 g.addColorStop(1,"#e0f7ff");
 ctx.fillStyle=g;
 ctx.fillRect(0,0,800,400);

 // 雲
 ctx.fillStyle="white";
 ctx.beginPath();
 ctx.arc(150,80,20,0,6.28);
 ctx.arc(180,80,25,0,6.28);
 ctx.arc(210,80,20,0,6.28);
 ctx.fill();

 // 地面
 map.forEach((row,y)=>{
  [...row].forEach((ch,x)=>{
   if(ch==="#"){
    let sx=x*TILE-cam,sy=y*TILE;

    // 土
    ctx.fillStyle="#7a5230";
    ctx.fillRect(sx,sy,TILE,TILE);

    // 芝
    ctx.fillStyle="#3cb043";
    ctx.fillRect(sx,sy,32,8);

    // 縁
    ctx.strokeStyle="#000";
    ctx.strokeRect(sx,sy,TILE,TILE);
   }
  });
 });

 // プレイヤー（簡易スプライト）
 ctx.fillStyle="blue";
 ctx.fillRect(p.x-cam,p.y,28,28);
 ctx.fillStyle="white";
 ctx.fillRect(p.x-cam+6,p.y+6,6,6);

}

// ===== ループ =====
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
