<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>しょぼんのパクリ（マリオ化）</title>
<style>
body{margin:0;background:#111;text-align:center;color:#fff;}
canvas{display:block;margin:auto;background:#87CEEB;}
</style>
</head>
<body>

<div id="ui"></div>
<canvas id="c" width="800" height="400"></canvas>

<script>
const ctx=c.getContext("2d");
const ui=document.getElementById("ui");

// ===== 入力 =====
let keys={},prev={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

// ===== 定数 =====
const GRAV=0.5,MAX_FALL=12;
const ACC=0.6,AIR_ACC=0.3;
const MAX=5,FRICTION=0.8;
const JUMP=11;

// ===== プレイヤー =====
let p={x:50,y:300,w:32,h:32,vx:0,vy:0,on:false,coyote:0,buffer:0};
let cam=0,score=0;

// ===== タイル =====
const map=[
"............................",
"............................",
"..............c.............",
"......###.............###...",
"....................c.......",
"####..............##########"
];

const TILE=32;

// ===== エンティティ =====
let coins=[];
let enemies=[{x:500,y:318,type:"goomba"},
             {x:700,y:318,type:"koopa",state:"walk",vx:2}];

// ===== 初期化 =====
function build(){
 coins=[];
 map.forEach((row,y)=>{
  [...row].forEach((ch,x)=>{
   if(ch==="c") coins.push({x:x*TILE+6,y:y*TILE+6,got:false});
  });
 });
}
build();

// ===== 衝突 =====
function solid(x,y){
 let tx=Math.floor(x/TILE),ty=Math.floor(y/TILE);
 if(!map[ty])return false;
 return map[ty][tx]==="#";
}

// ===== 更新 =====
function update(){

 // 入力
 let acc=p.on?ACC:AIR_ACC;
 if(keys["ArrowRight"])p.vx+=acc;
 if(keys["ArrowLeft"])p.vx-=acc;
 p.vx*=FRICTION;
 if(p.vx>MAX)p.vx=MAX;
 if(p.vx<-MAX)p.vx=-MAX;

 let jump=(keys[" "]&&!prev[" "])||(keys["ArrowUp"]&&!prev["ArrowUp"]);
 if(jump)p.buffer=6;

 // 重力
 p.vy+=GRAV;
 if(p.vy>MAX_FALL)p.vy=MAX_FALL;

 if(p.coyote>0)p.coyote--;

 // ジャンプ
 if(p.buffer>0 && p.coyote>0){
  p.vy=-JUMP;
  p.buffer=0;
  p.coyote=0;
 }
 p.buffer--;

 // ジャンプ離しで落下強化
 if(!keys[" "]&&!keys["ArrowUp"] && p.vy<0){
  p.vy+=0.5;
 }

 // X移動
 p.x+=p.vx;
 if(solid(p.x,p.y)||solid(p.x+p.w,p.y)){
  p.x-=p.vx;
  p.vx=0;
 }

 // Y移動
 p.y+=p.vy;
 p.on=false;

 if(solid(p.x,p.y+p.h)||solid(p.x+p.w,p.y+p.h)){
  p.y=Math.floor((p.y+p.h)/TILE)*TILE-p.h;
  p.vy=0;
  p.on=true;
  p.coyote=6;
 }

 if(solid(p.x,p.y)||solid(p.x+p.w,p.y)){
  p.y+=2;
  p.vy=0;
 }

 // コイン
 coins.forEach(c=>{
  if(!c.got && Math.abs(p.x-c.x)<20 && Math.abs(p.y-c.y)<20){
   c.got=true;
   score+=10;
  }
 });

 // 敵
 enemies.forEach(e=>{
  if(e.type==="goomba"){
   e.x+=1;
  }

  if(e.type==="koopa"){
   if(e.state==="walk") e.x+=e.vx;
   if(e.state==="shell") e.x+=e.vx;
  }

  // 当たり
  if(Math.abs(p.x-e.x)<30 && Math.abs(p.y-e.y)<30){
   if(p.vy>0){
    p.vy=-8;

    if(e.type==="goomba"){
     e.x=-100;
    }

    if(e.type==="koopa"){
     if(e.state==="walk"){
      e.state="shell";
      e.vx=0;
     }else{
      e.vx=6*(p.x<e.x?1:-1);
     }
    }

   }else{
    p.x=50;p.y=300;p.vx=0;p.vy=0;
   }
  }
 });

 cam+=(p.x-400-cam)*0.1;

 prev={...keys};
 ui.textContent="SCORE "+score;
}

// ===== 描画 =====
function draw(){

 ctx.fillStyle="#87CEEB";
 ctx.fillRect(0,0,800,400);

 // タイル
 map.forEach((row,y)=>{
  [...row].forEach((ch,x)=>{
   if(ch==="#"){
    ctx.fillStyle="#5c3a21";
    ctx.fillRect(x*TILE-cam,y*TILE,TILE,TILE);
   }
  });
 });

 // コイン
 coins.forEach(c=>{
  if(c.got)return;
  ctx.fillStyle="yellow";
  ctx.beginPath();
  ctx.arc(c.x-cam,c.y,8,0,Math.PI*2);
  ctx.fill();
 });

 // 敵
 enemies.forEach(e=>{
  ctx.fillStyle=e.type==="goomba"?"brown":"green";
  ctx.fillRect(e.x-cam,e.y,32,32);
 });

 // プレイヤー
 ctx.fillStyle="blue";
 ctx.fillRect(p.x-cam,p.y,32,32);
}

// ===== ループ =====
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
