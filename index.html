<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Space Invader Lite</title>
<style>
    body {
        margin: 0;
        background: black;
        color: white;
        text-align: center;
        font-family: monospace;
    }
    canvas {
        background: #000;
        display: block;
        margin: 0 auto;
        border: 2px solid white;
    }
</style>
</head>
<body>
<h2>SPACE INVADER (Lite)</h2>
<p>← → で移動 / スペースで射撃</p>
<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = { x: 180, y: 550, w: 40, h: 10, speed: 5 };
let bullets = [];
let enemies = [];
let keys = {};
let gameOver = false;

// 敵生成
for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 8; c++) {
        enemies.push({
            x: 40 + c * 40,
            y: 40 + r * 30,
            w: 20,
            h: 20,
            alive: true
        });
    }
}

let enemyDir = 1;

// 入力
document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

// 更新
function update() {
    if (gameOver) return;

    // プレイヤー移動
    if (keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["ArrowRight"]) player.x += player.speed;

    // 弾発射
    if (keys["Space"]) {
        if (bullets.length < 3) {
            bullets.push({ x: player.x + 18, y: player.y, w: 4, h: 10 });
        }
        keys["Space"] = false;
    }

    // 弾移動
    bullets.forEach(b => b.y -= 7);
    bullets = bullets.filter(b => b.y > 0);

    // 敵移動
    let moveDown = false;
    enemies.forEach(e => {
        if (!e.alive) return;
        e.x += enemyDir;
        if (e.x < 0 || e.x + e.w > canvas.width) moveDown = true;
    });

    if (moveDown) {
        enemyDir *= -1;
        enemies.forEach(e => e.y += 10);
    }

    // 当たり判定
    bullets.forEach(b => {
        enemies.forEach(e => {
            if (e.alive &&
                b.x < e.x + e.w &&
                b.x + b.w > e.x &&
                b.y < e.y + e.h &&
                b.y + b.h > e.y
            ) {
                e.alive = false;
                b.y = -100;
            }
        });
    });

    // ゲームオーバー判定
    enemies.forEach(e => {
        if (e.alive && e.y + e.h > player.y) {
            gameOver = true;
        }
    });
}

// 描画
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // プレイヤー
    ctx.fillStyle = "lime";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // 弾
    ctx.fillStyle = "yellow";
    bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

    // 敵
    ctx.fillStyle = "red";
    enemies.forEach(e => {
        if (e.alive) ctx.fillRect(e.x, e.y, e.w, e.h);
    });

    if (gameOver) {
        ctx.fillStyle = "white";
        ctx.font = "30px monospace";
        ctx.fillText("GAME OVER", 100, 300);
    }
}

// ループ
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
