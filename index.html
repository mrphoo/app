<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>しょぼんのパクリ（罠コース）</title>
<style>
body{margin:0;background:#111;text-align:center;color:#fff;}
canvas{display:block;margin:auto;background:#87CEEB;}
</style>
</head>
<body>

<div id="ui"></div>
<canvas id="c" width="800" height="400"></canvas>

<script>
const ctx=c.getContext("2d");
const ui=document.getElementById("ui");

// ===== 入力 =====
let keys={},prev={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

// ===== 定数 =====
const TILE=32;
const GRAV=0.5,MAX_FALL=12;
const ACC=0.6,AIR=0.3,FRIC=0.85,MAX=5,JUMP=11;

// ===== マップ =====
const map=[
"................................................",
"................................................",
".................c..............................",
".................?..............................",
"................................................",
"......###.................c.....................",
"................................................",
"####.............####.............###......##G..",
"................................................",
"####################..##########..##############"
];

// ===== 状態 =====
let p,cam=0,score=0,state="play";
let coins=[],blocks=[],items=[],enemies=[],goal={x:0,y:0};
let fakeBlocks=[];

// ===== 初期化 =====
function build(){
 coins=[];blocks=[];items=[];fakeBlocks=[];

 enemies=[{x:300,y:0,vx:1,vy:0}];

 map.forEach((row,y)=>{
  [...row].forEach((ch,x)=>{
   let px=x*TILE,py=y*TILE;

   if(ch==="c")coins.push({x:px+16,y:py+16,got:false,trap:false});
   if(ch==="?")blocks.push({x:px,y:py,used:false});
   if(ch==="G")goal={x:px,y:py};

   // 偽物床（適当に配置）
   if(y===9 && x===12){
    fakeBlocks.push({x:px,y:py,active:true});
   }
  });
 });

 // トラップコイン
 coins.push({x:450,y:200,got:false,trap:true});
}

function init(){
 p={x:64,y:0,w:28,h:28,vx:0,vy:0,on:false,coyote:0,buf:0,big:false};

 for(let y=0;y<map.length;y++){
  if(map[y][2]==="#"){
   p.y=y*TILE-28;
   break;
  }
 }

 build();
}
init();

// ===== 判定 =====
function solid(px,py){
 let tx=Math.floor(px/TILE),ty=Math.floor(py/TILE);
 if(!map[ty]||!map[ty][tx])return false;
 return map[ty][tx]==="#";
}

function isGrounded(p){
 return (
  solid(p.x+2,p.y+p.h)||
  solid(p.x+p.w/2,p.y+p.h)||
  solid(p.x+p.w-2,p.y+p.h)
 );
}

// ===== 更新 =====
function update(){

 let acc=p.on?ACC:AIR;

 if(keys["ArrowRight"])p.vx+=acc;
 if(keys["ArrowLeft"])p.vx-=acc;

 p.vx*=FRIC;
 p.vx=Math.max(-MAX,Math.min(MAX,p.vx));

 let jump=(keys[" "]&&!prev[" "])||(keys["ArrowUp"]&&!prev["ArrowUp"]);
 if(jump)p.buf=6;

 p.vy+=GRAV;
 if(p.vy>MAX_FALL)p.vy=MAX_FALL;

 if(p.coyote>0)p.coyote--;

 if(p.buf>0 && p.coyote>0){
  p.vy=-JUMP;
  p.buf=0;
  p.coyote=0;
 }
 p.buf--;

 if(!keys[" "]&&!keys["ArrowUp"] && p.vy<0)p.vy+=0.5;

 // X
 p.x+=p.vx;
 if(solid(p.x,p.y)||solid(p.x+p.w,p.y)){
  p.x-=p.vx;p.vx=0;
 }

 // Y
 p.y+=p.vy;
 p.on=false;

 if(p.vy>=0){
  if(isGrounded(p)){
   p.y=Math.floor((p.y+p.h)/TILE)*TILE-p.h;
   p.vy=0;
   p.on=true;
   p.coyote=6;
  }
 }

 if(p.vy<0){
  if(solid(p.x+2,p.y)||solid(p.x+p.w-2,p.y)){
   p.vy=0;
  }
 }

 // ===== 偽物床 =====
 fakeBlocks.forEach(b=>{
  if(b.active &&
     p.x<b.x+32 && p.x+p.w>b.x &&
     p.y+p.h>b.y && p.y+p.h<b.y+10){
    b.active=false;
  }
 });

 // ===== コイン =====
 coins.forEach(c=>{
  if(!c.got && Math.abs(p.x-c.x)<20 && Math.abs(p.y-c.y)<20){
   c.got=true;
   score+=10;

   // トラップ
   if(c.trap){
    p.vy=-15; // 強制ジャンプ（落とす）
   }
  }
 });

 // ===== ゴールトラップ =====
 if(
  p.x<goal.x+32 &&
  p.x+p.w>goal.x &&
  p.y<goal.y+64 &&
  p.y+p.h>goal.y
 ){
  // 偽物：落とす
  p.vy=-12;
  p.x-=100;
 }

 cam+=(p.x-400-cam)*0.1;
 prev={...keys};
 ui.textContent=`SCORE ${score}`;
}

// ===== 描画 =====
function draw(){

 ctx.fillStyle="#87CEEB";
 ctx.fillRect(0,0,800,400);

 // 地面
 map.forEach((row,y)=>{
  [...row].forEach((ch,x)=>{
   if(ch==="#"){
    ctx.fillStyle="#7a5230";
    ctx.fillRect(x*TILE-cam,y*TILE,32,32);
   }
  });
 });

 // 偽物床
 fakeBlocks.forEach(b=>{
  if(b.active){
   ctx.fillStyle="#999";
   ctx.fillRect(b.x-cam,b.y,32,32);
  }
 });

 // コイン
 coins.forEach(c=>{
  if(c.got)return;
  ctx.fillStyle="yellow";
  ctx.beginPath();
  ctx.arc(c.x-cam,c.y,8,0,6.28);
  ctx.fill();
 });

 // ゴール
 ctx.fillStyle="white";
 ctx.fillRect(goal.x-cam+12,goal.y-96,4,96);
 ctx.fillStyle="red";
 ctx.fillRect(goal.x-cam+16,goal.y-96,20,12);

 // プレイヤー
 ctx.fillStyle="blue";
 ctx.fillRect(p.x-cam,p.y,28,28);
}

// ===== ループ =====
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
