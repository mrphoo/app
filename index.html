<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>しょぼんのパクリ</title>
<style>
body{margin:0;background:#222;text-align:center;}
canvas{display:block;margin:10px auto;background:#87CEEB;}
</style>
</head>
<body>

<canvas id="game" width="800" height="400"></canvas>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

// ===== 入力 =====
let keys={},prev={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// ===== プレイヤー =====
let player,spawn;
let gravity=0.5;
let cam=0;
let invincible=0;

// ===== 初期化 =====
function init(){
 spawn={x:50,y:300};
 player={x:spawn.x,y:spawn.y,w:32,h:32,vx:0,vy:0,onGround:false,jumpCount:0,jumpBuffer:0};
 invincible=0;

 // ブロック状態リセット
 level.blocks.forEach(b=>b.used=false);
}

// ===== レベル =====
let level={
 width:2000,
 ground:350,
 blocks:[
  {x:300,y:260,type:"q",used:false},
  {x:350,y:260,type:"brick"},
  {x:700,y:260,type:"q",used:false}
 ],
 platforms:[
  {x:500,y:300,w:100,h:10,pass:true}
 ],
 enemies:[
  {x:600,y:318,dir:1},
  {x:1200,y:318,dir:-1}
 ],
 goal:{x:1800,y:280}
};

// ===== 当たり判定 =====
function hit(a,b){
 return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
}

// ===== 更新 =====
function update(){

 let jumpPress=(keys[" "]&&!prev[" "])||(keys["ArrowUp"]&&!prev["ArrowUp"]);
 if(jumpPress) player.jumpBuffer=6;

 player.vx=0;
 if(keys["ArrowRight"])player.vx=3;
 if(keys["ArrowLeft"])player.vx=-3;

 player.x+=player.vx;

 // ジャンプ処理（遅延バッファ）
 if(player.jumpBuffer>0 && player.jumpCount<2){
  player.vy=-10;
  player.jumpCount++;
  player.jumpBuffer=0;
 }

 player.jumpBuffer--;

 player.vy+=gravity;
 player.y+=player.vy;
 player.onGround=false;

 // 地面
 if(player.y+32>level.ground){
  player.y=level.ground-32;
  player.vy=0;
  player.onGround=true;
  player.jumpCount=0;
 }

 // 足場（↓ですり抜け）
 level.platforms.forEach(p=>{
  if(keys["ArrowDown"]) return;
  if(hit(player,{...p,w:p.w,h:p.h}) && player.vy>0){
   player.y=p.y-32;
   player.vy=0;
   player.onGround=true;
   player.jumpCount=0;
  }
 });

 // ブロック
 level.blocks.forEach(b=>{
  if(b.type==="q" && !b.used){
   if(player.y > b.y && hit(player,{...b,w:32,h:32})){
    b.used=true;
   }
  }
 });

 // 敵
 level.enemies.forEach(e=>{
  e.x+=e.dir*2;
  if(e.x<0||e.x>level.width)e.dir*=-1;

  if(hit(player,{...e,w:32,h:32}) && invincible<=0){
    player.x=spawn.x;
    player.y=spawn.y;
    invincible=60;
  }
 });

 if(invincible>0)invincible--;

 // ゴール
 if(hit(player,{...level.goal,w:10,h:70})){
  init();
 }

 cam=player.x-400;
 if(cam<0)cam=0;
 if(cam>level.width-800)cam=level.width-800;

 prev={...keys};
}

// ===== 描画 =====
function draw(){

 // 空（グラデーション）
 let grad=ctx.createLinearGradient(0,0,0,400);
 grad.addColorStop(0,"#87CEEB");
 grad.addColorStop(1,"#ffffff");
 ctx.fillStyle=grad;
 ctx.fillRect(0,0,800,400);

 // 地面
 ctx.fillStyle="#654321";
 ctx.fillRect(0,350,800,50);

 // ブロック
 level.blocks.forEach(b=>{
  ctx.fillStyle=b.type==="q"?(b.used?"#aaa":"gold"):"#b5651d";
  ctx.fillRect(b.x-cam,b.y,32,32);
 });

 // 足場
 ctx.fillStyle="#888";
 level.platforms.forEach(p=>{
  ctx.fillRect(p.x-cam,p.y,p.w,p.h);
 });

 // 敵（簡易アニメ）
 level.enemies.forEach(e=>{
  ctx.fillStyle="brown";
  ctx.beginPath();
  ctx.arc(e.x-cam+16,320,16,0,Math.PI*2);
  ctx.fill();
 });

 // ゴール
 ctx.fillStyle="red";
 ctx.fillRect(level.goal.x-cam,280,10,70);

 // プレイヤー（点滅＝無敵）
 if(invincible%10<5){
  ctx.fillStyle="blue";
  ctx.fillRect(player.x-cam,player.y,32,32);
 }
}

// ===== ループ =====
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

init();
loop();
</script>

</body>
</html>
