<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>しょぼんのパクリ</title>
<style>
body { margin:0; background:#222; color:white; text-align:center; font-family:sans-serif;}
canvas { display:block; margin:20px auto; border:2px solid black;}
</style>
</head>
<body>

<h2>しょぼんのパクリ</h2>
<p>← → 移動 / ↑ or スペース ジャンプ</p>
<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

let player = {x:50,y:0,w:30,h:30,vx:0,vy:0,onGround:false,frame:0};
let gravity = 0.5;
let cameraX = 0;

// ===== ステージ3つ =====
let levels = [
{
 width:2000,
 platforms:[
  {x:0,y:350,w:2000,h:50},
  {x:300,y:280,w:120,h:20},
  {x:600,y:240,w:120,h:20},
  {x:900,y:300,w:150,h:20}
 ],
 enemies:[
  {x:500,y:320,w:30,h:30,dir:1,frame:0}
 ],
 goal:{x:1800,y:300,w:40,h:50}
},
{
 width:2200,
 platforms:[
  {x:0,y:350,w:2200,h:50},
  {x:200,y:300,w:100,h:20},
  {x:500,y:260,w:100,h:20},
  {x:800,y:220,w:120,h:20},
  {x:1200,y:280,w:150,h:20}
 ],
 enemies:[
  {x:600,y:320,w:30,h:30,dir:1,frame:0},
  {x:1300,y:250,w:30,h:30,dir:-1,frame:0}
 ],
 goal:{x:2000,y:250,w:40,h:50}
},
{
 width:2500,
 platforms:[
  {x:0,y:350,w:2500,h:50},
  {x:400,y:280,w:120,h:20},
  {x:800,y:240,w:120,h:20},
  {x:1300,y:200,w:120,h:20},
  {x:1800,y:260,w:150,h:20}
 ],
 enemies:[
  {x:900,y:320,w:30,h:30,dir:1,frame:0},
  {x:1500,y:170,w:30,h:30,dir:-1,frame:0}
 ],
 goal:{x:2300,y:230,w:40,h:50}
}
];

let currentLevel = 0;

function hit(a,b){
 return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

function reset(){
 player.x=50; player.y=0;
 player.vx=0; player.vy=0;
 keys = {};
}

function update(){
 let level = levels[currentLevel];

 player.vx=0;
 if(keys["ArrowRight"]) player.vx=3;
 if(keys["ArrowLeft"]) player.vx=-3;

 player.x+=player.vx;

 if((keys[" "]||keys["ArrowUp"]) && player.onGround){
  player.vy=-10;
  player.onGround=false;
 }

 player.vy+=gravity;
 player.y+=player.vy;
 player.onGround=false;

 level.platforms.forEach(p=>{
  if(hit(player,p) && player.vy>0){
   player.y=p.y-player.h;
   player.vy=0;
   player.onGround=true;
  }
 });

 // 敵
 level.enemies.forEach(e=>{
  e.x+=e.dir*2;
  e.frame++;

  if(e.x<0||e.x>level.width-30) e.dir*=-1;

  if(hit(player,e)){
   if(player.vy>0 && player.y<e.y){
    e.x=-100;
    player.vy=-8;
   } else reset();
  }
 });

 // アニメーション
 if(player.vx!==0) player.frame++;

 cameraX = player.x-400;
 if(cameraX<0) cameraX=0;
 if(cameraX>level.width-800) cameraX=level.width-800;

 if(player.y>400) reset();

 if(hit(player,level.goal)){
  currentLevel++;
  if(currentLevel>=levels.length){
   alert("全クリ！");
   currentLevel=0;
  }
  reset();
 }
}

function draw(){
 let level = levels[currentLevel];

 // 空
 let grad = ctx.createLinearGradient(0,0,0,400);
 grad.addColorStop(0,"#87CEEB");
 grad.addColorStop(1,"#E0F6FF");
 ctx.fillStyle=grad;
 ctx.fillRect(0,0,800,400);

 // 雲（視差）
 ctx.fillStyle="white";
 for(let i=0;i<6;i++){
  let x=(i*300 - cameraX*0.3)%1800;
  ctx.beginPath();
  ctx.arc(x,80,20,0,Math.PI*2);
  ctx.arc(x+20,80,25,0,Math.PI*2);
  ctx.arc(x+40,80,20,0,Math.PI*2);
  ctx.fill();
 }

 // 足場（模様）
 level.platforms.forEach(p=>{
  let x=p.x-cameraX;
  ctx.fillStyle="#8B4513";
  ctx.fillRect(x,p.y,p.w,p.h);

  for(let i=0;i<p.w;i+=20){
   ctx.strokeRect(x+i,p.y,20,p.h);
  }
 });

 // 敵（アニメ）
 level.enemies.forEach(e=>{
  let x=e.x-cameraX;
  let bounce = Math.sin(e.frame*0.2)*3;

  ctx.fillStyle="#8B4513";
  ctx.beginPath();
  ctx.arc(x+15,e.y+15+bounce,15,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="black";
  ctx.fillRect(x+8,e.y+10+bounce,4,4);
  ctx.fillRect(x+18,e.y+10+bounce,4,4);
 });

 // ゴール
 let gx=level.goal.x-cameraX;
 ctx.fillStyle="black";
 ctx.fillRect(gx,level.goal.y,5,50);
 ctx.fillStyle="red";
 ctx.fillRect(gx+5,level.goal.y,20,15);

 // プレイヤー（歩きアニメ）
 let px=player.x-cameraX;
 let step = Math.sin(player.frame*0.3)*5;

 ctx.fillStyle="black";
 ctx.fillRect(px,player.y,30,30);

 ctx.fillStyle="white";
 ctx.fillRect(px+5,player.y+5,8,8);
 ctx.fillRect(px+17,player.y+5,8,8);

 // 足（動き）
 ctx.fillRect(px+5,player.y+25+step,5,5);
 ctx.fillRect(px+20,player.y+25-step,5,5);
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

reset();
loop();
</script>

</body>
</html>
