<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini Kart</title>
<style>
body { margin:0; background:#111; color:white; text-align:center; }
canvas { background:#222; display:block; margin:20px auto; }
</style>
</head>
<body>

<h1>Mini Kart</h1>
<canvas id="game" width="400" height="500"></canvas>
<p>← → で操作</p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let playerX = 200;
let speed = 5;
let obstacles = [];
let score = 0;
let gameOver = false;

// 入力
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowLeft") playerX -= 20;
    if(e.key==="ArrowRight") playerX += 20;
});

// 障害物生成
function spawn(){
    obstacles.push({
        x: Math.random()*360,
        y: -20,
        type: Math.random()<0.2 ? "boost":"rock"
    });
}

// 更新
function update(){
if(gameOver) return;

if(Math.random()<0.03) spawn();

obstacles.forEach(o=>{
    o.y += speed;
});

// 衝突
for(let o of obstacles){
    if(o.y>400 && Math.abs(o.x-playerX)<30){
        if(o.type==="rock"){
            gameOver=true;
            alert("クラッシュ！スコア:"+score);
            location.reload();
        } else {
            speed+=1;
            score+=50;
        }
    }
}

score++;
draw();

requestAnimationFrame(update);
}

// 描画
function draw(){
ctx.clearRect(0,0,400,500);

// 道
ctx.fillStyle="#555";
ctx.fillRect(100,0,200,500);

// プレイヤー
ctx.fillStyle="cyan";
ctx.fillRect(playerX,420,30,50);

// 障害物
obstacles.forEach(o=>{
    ctx.fillStyle = o.type==="rock"?"red":"yellow";
    ctx.fillRect(o.x,o.y,30,30);
});

// スコア
ctx.fillStyle="white";
ctx.fillText("Score:"+score,10,20);
}

update();
</script>

</body>
</html>
