<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini Platformer</title>
<style>
body { margin:0; background:#222; color:white; text-align:center; font-family:sans-serif;}
canvas { background:#87ceeb; display:block; margin:20px auto; border:2px solid black;}
</style>
</head>
<body>

<h2>Mini Platformer</h2>
<p>← → 移動 / スペース ジャンプ</p>
<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== 入力 =====
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// ===== プレイヤー =====
let player = {
  x: 50, y: 0, w: 30, h: 30,
  vx: 0, vy: 0, onGround: false
};

const gravity = 0.5;

// ===== ステージデータ =====
let levels = [
  {
    platforms: [
      {x:0,y:350,w:800,h:50},
      {x:200,y:280,w:100,h:20},
      {x:350,y:240,w:100,h:20},
    ],
    enemies: [
      {x:300,y:320,w:30,h:30,dir:1}
    ],
    goal: {x:700,y:300,w:30,h:50}
  },
  {
    platforms: [
      {x:0,y:350,w:800,h:50},
      {x:150,y:300,w:100,h:20},
      {x:300,y:260,w:100,h:20},
      {x:500,y:220,w:100,h:20},
    ],
    enemies: [
      {x:200,y:320,w:30,h:30,dir:1},
      {x:550,y:190,w:30,h:30,dir:-1}
    ],
    goal: {x:720,y:170,w:30,h:50}
  }
];

let currentLevel = 0;

// ===== 当たり判定 =====
function hit(a,b){
  return a.x < b.x+b.w &&
         a.x+a.w > b.x &&
         a.y < b.y+b.h &&
         a.y+a.h > b.y;
}

// ===== リセット =====
function reset(){
  player.x = 50;
  player.y = 0;
  player.vx = 0;
  player.vy = 0;
}

// ===== 更新 =====
function update(){
  let level = levels[currentLevel];

  // 移動
  player.vx = 0;
  if(keys["ArrowRight"]) player.vx = 3;
  if(keys["ArrowLeft"]) player.vx = -3;

  player.x += player.vx;

  // ジャンプ
  if(keys[" "] && player.onGround){
    player.vy = -10;
    player.onGround = false;
  }

  // 重力
  player.vy += gravity;
  player.y += player.vy;

  player.onGround = false;

  // 足場との当たり
  level.platforms.forEach(p=>{
    if(hit(player,p)){
      if(player.vy > 0){
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  });

  // 敵
  level.enemies.forEach(e=>{
    e.x += e.dir * 2;

    // 端で反転
    if(e.x < 0 || e.x > canvas.width-30){
      e.dir *= -1;
    }

    // プレイヤーと接触
    if(hit(player,e)){
      // 上から踏む
      if(player.vy > 0 && player.y < e.y){
        e.x = -100; // 消す
        player.vy = -8;
      } else {
        reset();
      }
    }
  });

  // 落下
  if(player.y > canvas.height){
    reset();
  }

  // ゴール
  if(hit(player, level.goal)){
    currentLevel++;
    if(currentLevel >= levels.length){
      alert("全クリ！");
      currentLevel = 0;
    }
    reset();
  }
}

// ===== 描画 =====
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  let level = levels[currentLevel];

  // 足場
  ctx.fillStyle = "green";
  level.platforms.forEach(p=>{
    ctx.fillRect(p.x,p.y,p.w,p.h);
  });

  // 敵
  ctx.fillStyle = "red";
  level.enemies.forEach(e=>{
    ctx.fillRect(e.x,e.y,e.w,e.h);
  });

  // ゴール
  ctx.fillStyle = "gold";
  ctx.fillRect(level.goal.x, level.goal.y, level.goal.w, level.goal.h);

  // プレイヤー
  ctx.fillStyle = "black";
  ctx.fillRect(player.x,player.y,player.w,player.h);
}

// ===== ループ =====
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>

</body>
</html>
