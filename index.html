<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マリオ風 修正版</title>
<style>
body{margin:0;background:#111;text-align:center;color:#fff;}
canvas{display:block;margin:auto;background:#87CEEB;}
</style>
</head>
<body>

<div id="ui"></div>
<canvas id="c" width="800" height="400"></canvas>

<script>
const ctx=c.getContext("2d");
const ui=document.getElementById("ui");

// ===== 入力 =====
let keys={},prev={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

// ===== 定数 =====
const TILE=32;
const GRAV=0.5, MAX_FALL=12;
const ACC=0.6, AIR=0.3, FRIC=0.85, MAX=5, JUMP=11;

// ===== マップ =====
const map=[
"............................",
"............................",
".............c..............",
".............?..............",
"......c.....................",
"......###.........c.........",
"............................",
"####.............####....###",
"............................",
"############################"
];

// ===== プレイヤー =====
let p,spawn={x:64,y:0};
let cam=0,score=0,state="play";

// ===== オブジェクト =====
let coins=[],blocks=[],items=[],enemies=[];

// ===== 初期化 =====
function build(){
 coins=[];blocks=[];items=[];
 enemies=[{x:500,y:0,vx:1,vy:0}];

 map.forEach((row,y)=>{
  [...row].forEach((ch,x)=>{
   let px=x*TILE,py=y*TILE;

   if(ch==="c")coins.push({x:px+16,y:py+16,got:false});
   if(ch==="?")blocks.push({x:px,y:py,used:false});
  });
 });
}

function init(){
 p={x:spawn.x,y:0,w:28,h:28,vx:0,vy:0,on:false,coyote:0,buf:0,big:false};

 // 地面にスポーン
 for(let y=0;y<map.length;y++){
  if(map[y][2]==="#"){
   p.y=y*TILE-28;
   break;
  }
 }

 build();
}
init();

// ===== 判定 =====
function solid(px,py){
 let tx=Math.floor(px/TILE),ty=Math.floor(py/TILE);
 if(!map[ty]||!map[ty][tx])return false;
 return map[ty][tx]==="#";
}

// 足元3点判定
function isGrounded(p){
 return (
  solid(p.x+2, p.y+p.h) ||
  solid(p.x+p.w/2, p.y+p.h) ||
  solid(p.x+p.w-2, p.y+p.h)
 );
}

// ===== 更新 =====
function update(){

 let acc=p.on?ACC:AIR;

 if(keys["ArrowRight"])p.vx+=acc;
 if(keys["ArrowLeft"])p.vx-=acc;

 p.vx*=FRIC;
 p.vx=Math.max(-MAX,Math.min(MAX,p.vx));

 let jump=(keys[" "]&&!prev[" "])||(keys["ArrowUp"]&&!prev["ArrowUp"]);
 if(jump)p.buf=6;

 p.vy+=GRAV;
 if(p.vy>MAX_FALL)p.vy=MAX_FALL;

 if(p.coyote>0)p.coyote--;

 if(p.buf>0 && p.coyote>0){
  p.vy=-JUMP;
  p.buf=0;
  p.coyote=0;
 }
 p.buf--;

 if(!keys[" "]&&!keys["ArrowUp"] && p.vy<0)p.vy+=0.5;

 // X移動
 p.x+=p.vx;
 if(solid(p.x,p.y)||solid(p.x+p.w,p.y)){
  p.x-=p.vx;
  p.vx=0;
 }

 // ===== Y移動（完全修正版）=====
 p.y+=p.vy;
 p.on=false;

 // 着地
 if(p.vy>=0){
  if(isGrounded(p)){
   p.y=Math.floor((p.y+p.h)/TILE)*TILE-p.h;
   p.vy=0;
   p.on=true;
   p.coyote=6;
  }
 }

 // 頭ぶつけ
 if(p.vy<0){
  if(
   solid(p.x+2,p.y) ||
   solid(p.x+p.w-2,p.y)
  ){
   p.vy=0;
  }
 }

 // ===== コイン =====
 coins.forEach(c=>{
  if(!c.got && Math.abs(p.x-c.x)<20 && Math.abs(p.y-c.y)<20){
   c.got=true;
   score+=10;
  }
 });

 // ===== ？ブロック =====
 blocks.forEach(b=>{
  if(!b.used && p.vy<0 &&
     p.x<b.x+32 && p.x+p.w>b.x &&
     p.y<b.y+32 && p.y+p.h>b.y){
    b.used=true;
    score+=20;

    items.push({x:b.x,y:b.y-20,vx:1,vy:0,type:"mush"});
  }
 });

 // ===== アイテム（重力追加）=====
 items.forEach(it=>{
  it.vy+=0.5;
  it.y+=it.vy;
  it.x+=it.vx;

  if(solid(it.x,it.y+20)){
   it.y=Math.floor((it.y+20)/TILE)*TILE-20;
   it.vy=0;
  }

  if(Math.abs(p.x-it.x)<20 && Math.abs(p.y-it.y)<20){
   p.big=true;
   score+=50;
   it.x=-100;
  }
 });

 // ===== 敵 =====
 enemies.forEach(e=>{
  e.vy+=0.5;
  e.y+=e.vy;
  e.x+=e.vx;

  if(solid(e.x,e.y+28)){
   e.y=Math.floor((e.y+28)/TILE)*TILE-28;
   e.vy=0;
  }

  if(Math.abs(p.x-e.x)<28 && Math.abs(p.y-e.y)<28){
   if(p.vy>0){
    p.vy=-8;
    e.x=-100;
    score+=50;
   }else{
    if(p.big){
     p.big=false;
    }else{
     init();
    }
   }
  }
 });

 // カメラ
 cam+=(p.x-400-cam)*0.1;

 prev={...keys};
 ui.textContent=`SCORE ${score}`;
}

// ===== 描画 =====
function draw(){

 let g=ctx.createLinearGradient(0,0,0,400);
 g.addColorStop(0,"#87CEEB");
 g.addColorStop(1,"#fff");
 ctx.fillStyle=g;
 ctx.fillRect(0,0,800,400);

 map.forEach((row,y)=>{
  [...row].forEach((ch,x)=>{
   if(ch==="#"){
    let sx=x*TILE-cam,sy=y*TILE;
    ctx.fillStyle="#7a5230";
    ctx.fillRect(sx,sy,32,32);
    ctx.fillStyle="#3cb043";
    ctx.fillRect(sx,sy,32,6);
   }
  });
 });

 coins.forEach(c=>{
  if(c.got)return;
  ctx.fillStyle="yellow";
  ctx.beginPath();
  ctx.arc(c.x-cam,c.y,8,0,6.28);
  ctx.fill();
 });

 blocks.forEach(b=>{
  ctx.fillStyle=b.used?"#aaa":"gold";
  ctx.fillRect(b.x-cam,b.y,32,32);
 });

 items.forEach(it=>{
  ctx.fillStyle="red";
  ctx.fillRect(it.x-cam,it.y,20,20);
 });

 ctx.fillStyle="brown";
 enemies.forEach(e=>{
  ctx.fillRect(e.x-cam,e.y,28,28);
 });

 ctx.fillStyle=p.big?"green":"blue";
 ctx.fillRect(p.x-cam,p.y,p.big?32:28,p.big?32:28);
}

// ===== ループ =====
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
