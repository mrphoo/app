<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>しょぼんのパクリ v2</title>
<style>
body{margin:0;background:#111;text-align:center;color:#fff;}
canvas{display:block;margin:auto;background:#87CEEB;}
</style>
</head>
<body>

<canvas id="game" width="800" height="400"></canvas>

<script>
const c=game,ctx=c.getContext("2d");

let keys={},prev={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

let player,cam=0;

function init(){
 player={
  x:50,y:300,
  vx:0,vy:0,
  w:32,h:32,
  on:false,
  jump:0,
  jumpHold:0
 };
}

const level={
 ground:350,
 platforms:[
  {x:300,y:300,w:120},
  {x:500,y:260,w:120},
  {x:700,y:220,w:120}
 ],
 enemies:[
  {x:600,y:318,dir:1}
 ],
 goal:{x:1000,y:280}
};

function hit(a,b){
 return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+10&&a.y+a.h>b.y;
}

function update(){

 // --- 移動（加速あり）
 if(keys["ArrowRight"]) player.vx+=0.5;
 if(keys["ArrowLeft"]) player.vx-=0.5;

 player.vx*=0.85; // 摩擦
 if(Math.abs(player.vx)<0.1) player.vx=0;

 player.x+=player.vx;

 // --- ジャンプ
 let press=(keys[" "]&&!prev[" "])||(keys["ArrowUp"]&&!prev["ArrowUp"]);

 if(press && player.jump<2){
  player.vy=-10;
  player.jump++;
  player.jumpHold=10;
 }

 if(keys[" "]||keys["ArrowUp"]){
  if(player.jumpHold>0){
   player.vy-=0.3;
   player.jumpHold--;
  }
 }

 // --- 重力
 player.vy+=0.5;
 player.y+=player.vy;
 player.on=false;

 // 地面
 if(player.y+32>level.ground){
  player.y=level.ground-32;
  player.vy=0;
  player.on=true;
  player.jump=0;
 }

 // 足場
 level.platforms.forEach(p=>{
  if(keys["ArrowDown"]) return;
  if(hit(player,p) && player.vy>0){
   player.y=p.y-32;
   player.vy=0;
   player.on=true;
   player.jump=0;
  }
 });

 // 敵
 level.enemies.forEach(e=>{
  e.x+=e.dir*2;
  if(hit(player,{...e,w:32})){
   if(player.vy>0){
    player.vy=-8;
   }else{
    init();
   }
  }
 });

 // ゴール
 if(hit(player,{...level.goal,w:10})){
  init();
 }

 // カメラ（なめらか）
 cam+=(player.x-400-cam)*0.1;

 prev={...keys};
}

function draw(){

 ctx.fillStyle="#87CEEB";
 ctx.fillRect(0,0,800,400);

 ctx.fillStyle="#654321";
 ctx.fillRect(0,350,800,50);

 // 足場
 ctx.fillStyle="#888";
 level.platforms.forEach(p=>{
  ctx.fillRect(p.x-cam,p.y,p.w,10);
 });

 // 敵
 ctx.fillStyle="brown";
 level.enemies.forEach(e=>{
  ctx.beginPath();
  ctx.arc(e.x-cam+16,320,16,0,Math.PI*2);
  ctx.fill();
 });

 // ゴール
 ctx.fillStyle="red";
 ctx.fillRect(level.goal.x-cam,280,10,70);

 // プレイヤー
 ctx.fillStyle="blue";
 ctx.fillRect(player.x-cam,player.y,32,32);
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

init();
loop();
</script>
</body>
</html>
