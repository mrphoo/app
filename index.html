<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>しょぼんのパクリ</title>
<style>
body{margin:0;background:#222;color:#fff;text-align:center;font-family:sans-serif;}
canvas{display:block;margin:20px auto;border:2px solid #000;}
</style>
</head>
<body>

<h2>しょぼんのパクリ</h2>
<p>← → 移動 / ↑ or スペース ジャンプ（2段ジャンプ可）</p>
<canvas id="game" width="800" height="400"></canvas>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// ===== プレイヤー =====
let player={
 x:50,y:0,w:30,h:30,
 vx:0,vy:0,onGround:false,
 jumpCount:0,maxJump:2,
 big:false,frame:0
};

let gravity=0.5;
let cameraX=0;
let coins=0;

// ===== ステージ（分岐あり）=====
let level={
 width:2200,
 platforms:[
  {x:0,y:350,w:2200,h:50},

  // 下ルート
  {x:300,y:300,w:120,h:20},
  {x:600,y:300,w:120,h:20},

  // 上ルート
  {x:300,y:200,w:120,h:20},
  {x:600,y:160,w:120,h:20},
  {x:900,y:120,w:120,h:20},

  {x:1300,y:260,w:150,h:20}
 ],
 enemies:[
  {x:700,y:320,w:30,h:30,dir:1}
 ],
 blocks:[
  {x:500,y:260,type:"coin",used:false},
  {x:900,y:80,type:"mushroom",used:false}
 ],
 items:[],
 goal:{x:2000,y:300,w:40,h:50}
};

// ===== 当たり判定 =====
function hit(a,b){
 return a.x<b.x+30&&a.x+a.w>b.x&&a.y<b.y+30&&a.y+a.h>b.y;
}

// ===== リセット =====
function reset(){
 player.x=50;player.y=0;
 player.vx=0;player.vy=0;
 player.jumpCount=0;
 player.big=false;
 player.w=30;player.h=30;
 keys={};
}

// ===== 更新 =====
function update(){

 // 移動
 player.vx=0;
 if(keys["ArrowRight"]) player.vx=3;
 if(keys["ArrowLeft"]) player.vx=-3;
 player.x+=player.vx;

 // ジャンプ（二段）
 if((keys[" "]||keys["ArrowUp"]) && player.jumpCount<player.maxJump){
  player.vy=-10;
  player.jumpCount++;
  keys[" "]=false; keys["ArrowUp"]=false;
 }

 // 重力
 player.vy+=gravity;
 player.y+=player.vy;
 player.onGround=false;

 // 足場
 level.platforms.forEach(p=>{
  if(player.x<p.x+p.w && player.x+player.w>p.x &&
     player.y+player.h>p.y && player.y<p.y+20){
    if(player.vy>0){
      player.y=p.y-player.h;
      player.vy=0;
      player.onGround=true;
      player.jumpCount=0;
    }
  }
 });

 // ブロック（下から叩く）
 level.blocks.forEach(b=>{
  if(!b.used &&
     player.x<b.x+30 && player.x+player.w>b.x &&
     player.y<b.y+30 && player.y+player.h>b.y){

    if(player.vy<0){ // 下からヒット
      b.used=true;

      if(b.type==="coin"){
        coins++;
      }
      if(b.type==="mushroom"){
        level.items.push({x:b.x,y:b.y-30,type:"mush"});
      }
    }
  }
 });

 // アイテム
 level.items.forEach(it=>{
  it.y+=1;
  if(hit(player,it)){
    if(it.type==="mush"){
      player.big=true;
      player.w=40; player.h=40;
    }
    it.x=-100;
  }
 });

 // 敵
 level.enemies.forEach(e=>{
  e.x+=e.dir*2;
  if(e.x<0||e.x>level.width-30)e.dir*=-1;

  if(hit(player,e)){
    if(player.vy>0){
      e.x=-100;
      player.vy=-8;
    }else{
      if(player.big){
        player.big=false;
        player.w=30; player.h=30;
      }else{
        reset();
      }
    }
  }
 });

 // カメラ
 cameraX=player.x-400;
 if(cameraX<0)cameraX=0;
 if(cameraX>level.width-800)cameraX=level.width-800;

 // ゴール
 if(hit(player,level.goal)){
  alert("クリア！ コイン:"+coins);
  coins=0;
  reset();
 }
}

// ===== 描画 =====
function draw(){

 // 空
 let g=ctx.createLinearGradient(0,0,0,400);
 g.addColorStop(0,"#87CEEB");
 g.addColorStop(1,"#E0F6FF");
 ctx.fillStyle=g;
 ctx.fillRect(0,0,800,400);

 // 足場
 level.platforms.forEach(p=>{
  ctx.fillStyle="#8B4513";
  ctx.fillRect(p.x-cameraX,p.y,p.w,p.h);
 });

 // ブロック（？）
 level.blocks.forEach(b=>{
  ctx.fillStyle=b.used?"#999":"gold";
  ctx.fillRect(b.x-cameraX,b.y,30,30);
 });

 // アイテム
 ctx.fillStyle="green";
 level.items.forEach(it=>{
  ctx.fillRect(it.x-cameraX,it.y,20,20);
 });

 // 敵
 level.enemies.forEach(e=>{
  ctx.fillStyle="#8B4513";
  ctx.beginPath();
  ctx.arc(e.x-cameraX+15,e.y+15,15,0,Math.PI*2);
  ctx.fill();
 });

 // ゴール
 ctx.fillStyle="red";
 ctx.fillRect(level.goal.x-cameraX,level.goal.y,30,50);

 // プレイヤー
 ctx.fillStyle="black";
 ctx.fillRect(player.x-cameraX,player.y,player.w,player.h);

 // UI
 ctx.fillStyle="white";
 ctx.fillText("COIN: "+coins,10,20);
}

// ===== ループ =====
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

reset();
loop();
</script>

</body>
</html>
