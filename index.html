<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>しょぼんのパクリ</title>
<style>
body{margin:0;background:#222;text-align:center;}
canvas{display:block;margin:20px auto;border:2px solid #000;}
</style>
</head>
<body>

<h2>しょぼんのパクリ</h2>
<canvas id="game" width="800" height="400"></canvas>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

// ===== 画像 =====
const imgPlayer=new Image();
imgPlayer.src="https://i.imgur.com/6X12v9x.png";

const imgEnemy=new Image();
imgEnemy.src="https://i.imgur.com/3WbQZQp.png";

const imgBlock=new Image();
imgBlock.src="https://i.imgur.com/W5bR6Vf.png";

const imgQ=new Image();
imgQ.src="https://i.imgur.com/yY6XG6x.png";

// ===== 入力 =====
let keys={},prev={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// ===== プレイヤー =====
let player={x:50,y:300,w:32,h:32,vx:0,vy:0,onGround:false,jump:0};
let gravity=0.5;
let cam=0;

// ===== コース（1-1風）=====
let level={
 width:2000,
 ground:350,
 blocks:[
  {x:400,y:260,type:"q"},
  {x:450,y:260,type:"brick"},
  {x:900,y:260,type:"q"}
 ],
 enemies:[
  {x:600,y:320,dir:1},
  {x:1200,y:320,dir:-1}
 ],
 stairs:[
  {x:1400,y:320},{x:1432,y:288},{x:1464,y:256},{x:1496,y:224}
 ],
 goal:{x:1800,y:280}
};

// ===== 当たり =====
function hit(a,b){
 return a.x<b.x+32&&a.x+32>b.x&&a.y<b.y+32&&a.y+32>b.y;
}

// ===== 更新 =====
function update(){

 let jumpPress=(keys[" "]&&!prev[" "])||(keys["ArrowUp"]&&!prev["ArrowUp"]);

 player.vx=0;
 if(keys["ArrowRight"])player.vx=3;
 if(keys["ArrowLeft"])player.vx=-3;
 player.x+=player.vx;

 if(jumpPress && player.jump<2){
  player.vy=-10;
  player.jump++;
 }

 player.vy+=gravity;
 player.y+=player.vy;
 player.onGround=false;

 // 地面
 if(player.y+32>level.ground){
  player.y=level.ground-32;
  player.vy=0;
  player.onGround=true;
  player.jump=0;
 }

 // 階段
 level.stairs.forEach(s=>{
  if(hit(player,s) && player.vy>0){
    player.y=s.y-32;
    player.vy=0;
    player.onGround=true;
    player.jump=0;
  }
 });

 // 敵
 level.enemies.forEach(e=>{
  e.x+=e.dir*2;
  if(hit(player,e)){
    player.x=50;
    player.y=300;
  }
 });

 cam=player.x-400;
 if(cam<0)cam=0;
 if(cam>level.width-800)cam=level.width-800;

 prev={...keys};
}

// ===== 描画 =====
function draw(){

 // 空
 ctx.fillStyle="#87CEEB";
 ctx.fillRect(0,0,800,400);

 // 地面
 ctx.fillStyle="#8B4513";
 ctx.fillRect(0,350,800,50);

 // ブロック
 level.blocks.forEach(b=>{
  let img=b.type==="q"?imgQ:imgBlock;
  ctx.drawImage(img,b.x-cam,b.y,32,32);
 });

 // 階段
 level.stairs.forEach(s=>{
  ctx.drawImage(imgBlock,s.x-cam,s.y,32,32);
 });

 // 敵
 level.enemies.forEach(e=>{
  ctx.drawImage(imgEnemy,e.x-cam,320,32,32);
 });

 // ゴール
 ctx.fillStyle="red";
 ctx.fillRect(level.goal.x-cam,280,10,70);

 // プレイヤー
 ctx.drawImage(imgPlayer,player.x-cam,player.y,32,32);
}

// ループ
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
